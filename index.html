<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dawat-e-Iftar Countdown</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    /* font-family: 'Segoe UI', sans-serif; */
    font-family: 'Times New Roman', Times, serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    color:#f5d17a;
    

    /* 🔥 Your Photo as Background */
    background: 
        linear-gradient(rgba(0,0,0,0.75), rgba(0,0,0,0.75)),
        url("iftar.jpg") no-repeat center center/cover;
}

/* .container{
    background: rgba(0,0,0,0.6);
    padding:40px;
    border-radius:20px;
    backdrop-filter: blur(6px);
    box-shadow:0 0 25px rgba(255,215,100,0.4);
    width:90%;
    max-width:600px;
} */

h1{
    font-size:40px;
    margin-bottom:10px;
}

p{
    color:#ddd;
    margin-bottom:30px;
}

.countdown{
    display:flex;
    justify-content:space-between;
    gap:10px;
    flex-wrap:wrap;
}

.time-box{
    background:rgba(255,215,100,0.1);
    padding:20px;
    border-radius:15px;
    width:110px;
}

.time-box span{
    display:block;
    font-size:28px;
    font-weight:bold;
}

.label{
    font-size:14px;
    margin-top:5px;
}

.footer{
    margin-top:25px;
    font-size:14px;
    color:#ccc;
}
</style>
</head>

<body>

<div class="container">
    <h1>Dawat-e-Iftar</h1>
    <p>6 March 2026 • 05:00 PM</p>

    <div class="countdown">
        <div class="time-box">
            <span id="days">0</span>
            <div class="label">Days</div>
        </div>
        <div class="time-box">
            <span id="hours">0</span>
            <div class="label">Hours</div>
        </div>
        <div class="time-box">
            <span id="minutes">0</span>
            <div class="label">Minutes</div>
        </div>
        <div class="time-box">
            <span id="seconds">0</span>
            <div class="label">Seconds</div>
        </div>
    </div>

    <div class="footer">
        Organized by Nazrul Mess
    </div>
</div>

<script>
const eventDate = new Date("March 6, 2026 17:00:00").getTime();

const countdownFunction = setInterval(function() {

    const now = new Date().getTime();
    const distance = eventDate - now;

    const days = Math.floor(distance / (1000 * 60 * 60 * 24));
    const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
    const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
    const seconds = Math.floor((distance % (1000 * 60)) / 1000);

    document.getElementById("days").innerHTML = days;
    document.getElementById("hours").innerHTML = hours;
    document.getElementById("minutes").innerHTML = minutes;
    document.getElementById("seconds").innerHTML = seconds;

    if (distance < 0) {
        clearInterval(countdownFunction);
        document.querySelector(".countdown").innerHTML = 
        "<h2 style='color:#f5d17a;'>Iftar Time Started! 🌙</h2>";
    }

}, 1000);
</script>

</body>
</html>
