<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dawat-e-Iftar Countdown</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    /* font-family: 'Segoe UI', sans-serif; */
    font-family: 'Times New Roman', Times, serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    color:#f5d17a;

    background: 
        linear-gradient(rgba(0,0,0,0.75), rgba(0,0,0,0.75)),
        url("iftar.jpg") no-repeat center center;
    background-size: cover;   /* always fit */
}

/* Title Layout */
.title{
    display:flex;
    flex-direction:column;
    align-items:center;
    line-height:1;
    margin-bottom:25px;
}

.title .top,
.title .bottom{
    font-size: clamp(40px, 7vw, 85px);
    color:#e6b35a;
    letter-spacing:2px;
}

.title .e{
    font-size: clamp(30px, 5vw, 60px);
    color:#e6b35a;
    margin:8px 0;
}

.container{
    background: rgba(0, 0, 0, 0.285);
    padding:40px;
    border-radius:20px;
    backdrop-filter: blur(6px);
    box-shadow:0 0 25px rgba(255,215,100,0.4);
    width:90%;
    max-width:600px;
}

h1{
    font-size:40px;
    margin-bottom:10px;
}

p{
    color:#ddd;
    margin-bottom:30px;
}

.countdown{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:2vw;              /* responsive gap */
}

.time-box{
    flex:1;               /* equal width */
    padding:2vw 1vw;      /* responsive padding */
    border-radius:1.5vw;
    background:rgba(255,215,100,0.1);
    text-align:center;
}

.time-box span{
    font-size:9vw;        /* responsive number size */
    font-weight:bold;
}

.label{
    font-size:1.5vw;
    margin-top:0.5vw;
}

.footer{
    margin-top:25px;
    font-size:14px;
    color:#ccc;
}
</style>
</head>

<body>

<div class="container">
    <h1 class="title">
        <span class="top">Dawat</span>
        <span class="e">E</span>
        <span class="bottom">Iftar</span>
    </h1>
    <p>6 March 2026 • 05:48 PM</p>

    <div class="countdown">
        <div class="time-box">
            <span id="days">0</span>
            <div class="label">Days</div>
        </div>
        <div class="time-box">
            <span id="hours">0</span>
            <div class="label">Hours</div>
        </div>
        <div class="time-box">
            <span id="minutes">0</span>
            <div class="label">Minutes</div>
        </div>
        <div class="time-box">
            <span id="seconds">0</span>
            <div class="label">Seconds</div>
        </div>
    </div>

    <div class="footer">
        Organized by Nazrul Mess
    </div>
</div>

<script>
const eventDate = new Date("March 6, 2026 17:48:00").getTime();

const countdownFunction = setInterval(function() {

    const now = new Date().getTime();
    const distance = eventDate - now;

    const days = Math.floor(distance / (1000 * 60 * 60 * 24));
    const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
    const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
    const seconds = Math.floor((distance % (1000 * 60)) / 1000);

    document.getElementById("days").innerHTML = days;
    document.getElementById("hours").innerHTML = hours;
    document.getElementById("minutes").innerHTML = minutes;
    document.getElementById("seconds").innerHTML = seconds;

    if (distance < 0) {
        clearInterval(countdownFunction);
        document.querySelector(".countdown").innerHTML = 
        "<h2 style='color:#f5d17a;'>Iftar Time Started! 🌙</h2>";
    }

}, 1000);
</script>

</body>
</html>
